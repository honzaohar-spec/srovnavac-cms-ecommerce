<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMS & E-commerce Platform Comparator</title>
<style>
:root {
  --bg: #ffffff;
  --bg2: #f5f5f7;
  --bg3: #e8e8ed;
  --txt: #1d1d1f;
  --txt2: #6e6e73;
  --accent: #0071e3;
  --green: #30d158;
  --orange: #ff9f0a;
  --red: #ff3b30;
  --border: rgba(0,0,0,0.09);
  --border2: rgba(0,0,0,0.16);
  --shadow: 0 2px 12px rgba(0,0,0,0.07);
  --r: 12px;
  --t: 0.25s ease;
  --header-h: 57px;
  --filter-h: 54px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #000;
    --bg2: #1c1c1e;
    --bg3: #2c2c2e;
    --txt: #f5f5f7;
    --txt2: #98989d;
    --border: rgba(255,255,255,0.1);
    --border2: rgba(255,255,255,0.2);
    --shadow: 0 2px 16px rgba(0,0,0,0.5);
  }
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",system-ui,sans-serif;background:var(--bg);color:var(--txt);line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}

/* ── HEADER ── */
.hdr{
  position:sticky;top:0;z-index:300;
  height:var(--header-h);
  background:rgba(255,255,255,0.9);
  backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 24px;gap:20px;
}
@media(prefers-color-scheme:dark){.hdr{background:rgba(0,0,0,0.9)}}
.logo{font-size:16px;font-weight:700;letter-spacing:-.3px;white-space:nowrap;flex-shrink:0}
.logo span{color:var(--accent)}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.counter-badge{
  background:var(--accent);color:#fff;
  font-size:12px;font-weight:600;
  padding:4px 12px;border-radius:20px;white-space:nowrap;
}
.reset-btn{
  padding:5px 14px;border:1.5px solid var(--border2);border-radius:8px;
  background:transparent;font-size:13px;font-weight:500;color:var(--txt2);
  transition:var(--t);white-space:nowrap;
}
.reset-btn:hover{border-color:var(--red);color:var(--red)}
.reset-btn.hidden{display:none}

/* ── FILTER BAR ── */
.fbar{
  position:sticky;top:var(--header-h);z-index:250;
  height:var(--filter-h);
  background:rgba(255,255,255,0.92);
  backdrop-filter:saturate(180%) blur(16px);
  -webkit-backdrop-filter:saturate(180%) blur(16px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:16px;padding:0 24px;
  overflow-x:auto;scrollbar-width:none;
}
.fbar::-webkit-scrollbar{display:none}
@media(prefers-color-scheme:dark){.fbar{background:rgba(0,0,0,0.92)}}

.filter-group{display:flex;align-items:center;gap:5px;flex-shrink:0}
.filter-label{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--txt2);white-space:nowrap;margin-right:2px}
.fpill{
  padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);
  background:transparent;font-size:12px;font-weight:500;color:var(--txt2);
  transition:var(--t);white-space:nowrap;
}
.fpill:hover{border-color:var(--accent);color:var(--txt)}
.fpill.on{background:var(--accent);border-color:var(--accent);color:#fff}

.fsep{width:1px;height:24px;background:var(--border2);flex-shrink:0;margin:0 2px}

.fsearch{
  padding:6px 12px;border-radius:8px;border:1.5px solid var(--border);
  background:var(--bg2);font-size:13px;color:var(--txt);
  outline:none;width:170px;transition:var(--t);
}
.fsearch:focus{border-color:var(--accent);background:var(--bg)}
.fsearch::placeholder{color:var(--txt2)}

/* ── MAIN ── */
.main{padding:0 0 80px}

/* ── TABLE WRAPPER ── */
.tbl-wrap{
  overflow-x:auto;
  overflow-y:visible;
}

/* ── TABLE ── */
.ctbl{
  border-collapse:collapse;
  width:max-content;
  min-width:100%;
}

/* Sticky column header row */
.ctbl thead tr{
  position:sticky;
  top:calc(var(--header-h) + var(--filter-h));
  z-index:150;
  background:var(--bg);
}

/* Sticky first column */
.ctbl td:first-child,
.ctbl th:first-child{
  position:sticky;left:0;z-index:50;background:var(--bg);
}
/* Even rows */
.ctbl tbody tr.frow:nth-child(even) td{background:var(--bg2)}
.ctbl tbody tr.frow:nth-child(even) td:first-child{background:var(--bg2)}

/* Corner cell (top-left): sticky in both directions */
.ctbl thead tr th:first-child{
  position:sticky;left:0;top:calc(var(--header-h)+var(--filter-h));
  z-index:200;background:var(--bg);
}

/* Platform header cell */
.pth{
  min-width:150px;max-width:175px;
  padding:14px 10px 10px;
  border-left:1px solid var(--border);
  vertical-align:top;text-align:center;
  background:var(--bg);
  transition:opacity var(--t);
}
.pth.hidden-col{display:none}

.p-icon{
  width:44px;height:44px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:800;color:#fff;
  margin:0 auto 6px;transition:var(--t);
}
.p-name{font-size:12px;font-weight:600;margin-bottom:3px;line-height:1.25;color:var(--txt)}
.cat-badge{
  display:inline-block;padding:1px 7px;border-radius:6px;
  font-size:9px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;
  margin-bottom:3px;
}
.cat-badge.cms{background:rgba(0,113,227,0.12);color:var(--accent)}
.cat-badge.ec{background:rgba(48,209,88,0.14);color:#1a7f40}
@media(prefers-color-scheme:dark){.cat-badge.ec{color:#30d158}}
.tier-badge{
  display:inline-block;padding:2px 7px;border-radius:8px;
  font-size:9px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;
  color:#fff;margin-bottom:6px;
}
.specbar{
  position:relative;height:4px;border-radius:2px;margin:4px 6px 2px;
  background:linear-gradient(90deg,#30d158,#ff9f0a 50%,#ff3b30);
  cursor:pointer;
}
.specdot{
  position:absolute;top:50%;transform:translate(-50%,-50%);
  width:10px;height:10px;border-radius:50%;
  background:#fff;border:2px solid rgba(0,0,0,.35);
  box-shadow:0 1px 3px rgba(0,0,0,.2);
  transition:transform var(--t);
}
.specbar:hover .specdot{transform:translate(-50%,-50%) scale(1.5)}
.specbar:hover .spec-tip{opacity:1}
.spec-tip{
  position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
  background:var(--txt);color:var(--bg);
  font-size:11px;padding:4px 8px;border-radius:6px;
  white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .2s;
  z-index:999;
}

/* Feature column header (corner) */
.th-feat{
  min-width:220px;max-width:250px;
  padding:14px 16px;text-align:left;
  font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  color:var(--txt2);border-right:1px solid var(--border);
}

/* Group row */
.ctbl tbody tr.grow td{
  padding:9px 16px;background:var(--bg2)!important;
  font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;
  color:var(--txt2);cursor:pointer;user-select:none;
  border-bottom:1px solid var(--border);
}
.ctbl tbody tr.grow td:first-child{
  border-right:1px solid var(--border);
  display:flex;align-items:center;gap:7px;
  background:var(--bg2)!important;
}
.chev{display:inline-block;transition:transform .2s;font-size:9px}
.grow.col .chev{transform:rotate(-90deg)}

/* Feature row */
.ctbl tbody tr.frow{cursor:pointer;transition:background .12s}
.ctbl tbody tr.frow:hover td{background:rgba(0,113,227,0.04)!important}
.ctbl tbody tr.frow td{
  padding:10px 16px;border-bottom:1px solid var(--border);
  font-size:13px;text-align:center;transition:opacity var(--t);
}
.ctbl tbody tr.frow td:first-child{
  text-align:left;border-right:1px solid var(--border);
  font-size:13px;color:var(--txt);
}
.ctbl tbody tr.frow td.hidden-col{display:none}

/* Cell value */
.cv1{color:var(--green);font-size:16px}
.cv5{color:var(--orange);font-size:16px}
.cv0{color:var(--red);font-size:16px;opacity:.65}
.cvt{font-size:11.5px;font-weight:500;color:var(--txt);
  display:inline-block;padding:2px 7px;background:var(--bg2);border-radius:5px;line-height:1.4}

/* Pulse/fade on row highlight */
@keyframes pglow{
  0%{transform:scale(1);box-shadow:0 0 0 0 rgba(48,209,88,.65)}
  45%{transform:scale(1.18);box-shadow:0 0 0 10px rgba(48,209,88,0)}
  100%{transform:scale(1);box-shadow:0 0 0 0 rgba(48,209,88,0)}
}
.pth.hl-yes .p-icon{animation:pglow .7s ease}
.pth.hl-no .p-icon{opacity:.28;transform:scale(.96)}
.pth.hl-no .p-name,.pth.hl-no .cat-badge,.pth.hl-no .tier-badge{opacity:.3}

/* ── FIT SECTION ── */
.fit-sec{padding:48px 24px 0}
.sec-title{font-size:24px;font-weight:700;letter-spacing:-.4px;margin-bottom:5px}
.sec-sub{font-size:14px;color:var(--txt2);margin-bottom:24px}
.fit-scroll{display:flex;gap:16px;overflow-x:auto;padding-bottom:12px;align-items:flex-start}
.fit-scroll::-webkit-scrollbar{height:4px}
.fit-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.fit-card{
  background:var(--bg2);border-radius:var(--r);
  padding:20px;min-width:245px;flex-shrink:0;
  box-shadow:var(--shadow);
}
.fit-card.hidden-col{display:none}
.fc-head{display:flex;align-items:center;gap:10px;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.fc-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0}
.fc-name{font-size:13px;font-weight:600;line-height:1.2}
.fc-tier{font-size:11px;color:var(--txt2)}
.donuts{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.dw{display:flex;flex-direction:column;align-items:center;gap:5px}
.dsvg{width:64px;height:64px;overflow:visible}
.dbg{fill:none;stroke:var(--border2);stroke-width:5}
.dring{fill:none;stroke:var(--accent);stroke-width:5;stroke-linecap:round;
  transform-origin:50% 50%;transform:rotate(-90deg);
  stroke-dasharray:150.8;stroke-dashoffset:150.8;
  transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1)}
.dpct{font-size:12px;font-weight:700;fill:var(--txt);dominant-baseline:middle;text-anchor:middle}
.dlbl{font-size:10px;color:var(--txt2);text-align:center;line-height:1.3;max-width:66px}

/* ── SCROLLBARS ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* No-results */
.no-results{padding:60px 24px;text-align:center;color:var(--txt2);font-size:15px}

/* ── SHARED TOOLTIP (single floating element on body) ── */
#shared-tip{
  position:fixed;z-index:9999;
  background:#1d1d1f;color:#fff;
  font-size:13px;line-height:1.55;
  padding:12px 16px;border-radius:12px;
  box-shadow:0 8px 32px rgba(0,0,0,.3);
  max-width:320px;pointer-events:none;
  opacity:0;transform:translateY(6px);
  transition:opacity .16s ease,transform .16s ease;
  white-space:normal;word-break:break-word;
}
#shared-tip.tip-show{opacity:1;transform:translateY(0)}
#shared-tip::after{
  content:'';position:absolute;
  top:-6px;left:18px;
  border:6px solid transparent;
  border-bottom-color:#1d1d1f;border-top:none;
}
#shared-tip.tip-above::after{
  top:auto;bottom:-6px;
  border-bottom-color:transparent;
  border-top:6px solid #1d1d1f;
}
@media(prefers-color-scheme:dark){
  #shared-tip{background:#f5f5f7;color:#1d1d1f}
  #shared-tip::after{border-bottom-color:#f5f5f7}
  #shared-tip.tip-above::after{border-top-color:#f5f5f7;border-bottom-color:transparent}
}

/* ── WWW BUTTON in platform header ── */
.www-btn{
  display:inline-flex;align-items:center;gap:4px;
  margin-top:5px;padding:3px 9px;
  border-radius:20px;border:1.5px solid var(--border2);
  background:transparent;font-size:10px;font-weight:600;
  color:var(--txt2);text-decoration:none;letter-spacing:.3px;
  transition:background .2s,color .2s,border-color .2s;
  white-space:nowrap;cursor:pointer;
}
.www-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ── COMPARE BUTTON ── */
.cmp-btn{
  display:flex;align-items:center;gap:6px;
  padding:6px 14px;border-radius:10px;
  border:1.5px solid var(--accent);background:transparent;
  font-size:13px;font-weight:600;color:var(--accent);
  transition:var(--t);white-space:nowrap;flex-shrink:0;
}
.cmp-btn:hover,.cmp-btn.active{background:var(--accent);color:#fff}

/* ── COMPARE PANEL ── */
#cmp-panel{
  overflow:hidden;max-height:0;
  transition:max-height .38s cubic-bezier(.4,0,.2,1);
  background:var(--bg);border-bottom:1px solid var(--border);
}
#cmp-panel.open{max-height:480px}
.cmp-inner{padding:20px 24px 16px}
.cmp-row{display:flex;align-items:flex-start;gap:16px;flex-wrap:wrap}
.cmp-left{flex:1;min-width:260px}
.cmp-right{flex:0 0 260px}
.cmp-search{
  width:100%;padding:9px 14px;border-radius:10px;
  border:1.5px solid var(--border);background:var(--bg2);
  font-size:14px;color:var(--txt);outline:none;transition:border-color .2s;
  font-family:inherit;
}
.cmp-search:focus{border-color:var(--accent);background:var(--bg)}
.cmp-search::placeholder{color:var(--txt2)}
.cmp-results{
  display:flex;flex-wrap:wrap;gap:5px;
  margin-top:10px;max-height:130px;overflow-y:auto;
}
.cmp-chip{
  display:flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:20px;
  border:1.5px solid var(--border);background:var(--bg2);
  font-size:12px;font-weight:500;color:var(--txt);
  cursor:pointer;transition:var(--t);
}
.cmp-chip:hover{border-color:var(--accent)}
.cmp-chip.sel{background:var(--accent);border-color:var(--accent);color:#fff}
.cmp-chip.maxed{opacity:.35;cursor:not-allowed;pointer-events:none}
.cmp-cdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

.cmp-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px;min-height:28px}
.cmp-tag{
  display:flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:20px;
  background:var(--accent);color:#fff;
  font-size:12px;font-weight:600;
}
.cmp-tag-x{cursor:pointer;opacity:.75;font-size:13px;line-height:1}
.cmp-tag-x:hover{opacity:1}

.cmp-presets-label{
  font-size:11px;font-weight:700;letter-spacing:.5px;
  text-transform:uppercase;color:var(--txt2);margin-bottom:7px;
}
.cmp-preset-list{display:flex;flex-direction:column;gap:5px}
.cmp-preset{
  padding:6px 12px;border-radius:8px;border:1.5px solid var(--border);
  background:transparent;font-size:12px;color:var(--txt2);
  cursor:pointer;transition:var(--t);text-align:left;font-family:inherit;
}
.cmp-preset:hover{border-color:var(--accent);color:var(--accent);background:rgba(0,113,227,.05)}

.cmp-actions{display:flex;gap:8px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}
.cmp-go{
  padding:8px 20px;border-radius:10px;border:none;
  background:var(--accent);color:#fff;
  font-size:14px;font-weight:600;cursor:pointer;
  transition:var(--t);font-family:inherit;
}
.cmp-go:disabled{opacity:.38;cursor:not-allowed}
.cmp-go:not(:disabled):hover{background:#0077ed}
.cmp-cancel{
  padding:8px 16px;border-radius:10px;
  border:1.5px solid var(--border2);background:transparent;
  font-size:13px;color:var(--txt2);cursor:pointer;
  transition:var(--t);font-family:inherit;
}
.cmp-cancel:hover{border-color:var(--red);color:var(--red)}
.cmp-hint{font-size:12px;color:var(--txt2);margin-left:4px;align-self:center}

/* ── COMPARE BANNER ── */
#cmp-banner{
  display:none;align-items:center;gap:8px;flex-wrap:wrap;
  padding:9px 24px;
  background:rgba(0,113,227,.07);
  border-bottom:1px solid rgba(0,113,227,.18);
  font-size:13px;
}
#cmp-banner.active{display:flex}
.cmp-banner-lbl{color:var(--txt2);font-size:12px}
.cmp-banner-names{color:var(--accent);font-weight:600}
.cmp-end{
  margin-left:auto;padding:4px 12px;border-radius:8px;
  border:1.5px solid var(--accent);background:transparent;
  color:var(--accent);font-size:12px;font-weight:600;
  cursor:pointer;transition:var(--t);font-family:inherit;
}
.cmp-end:hover{background:var(--red);border-color:var(--red);color:#fff}

/* ── LOGOS ── */
.p-icon-logo{
  background:var(--bg2)!important;
  border:1.5px solid var(--border);
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.p-logo{
  max-height:28px;max-width:72px;
  object-fit:contain;
  filter:grayscale(1) opacity(.55);
  transition:filter .3s ease;
}
.pth:hover .p-logo,.pth.hl-yes .p-logo{filter:grayscale(0) opacity(1)}

/* ── LEGEND ── */
.legend{
  display:flex;align-items:center;gap:20px;
  padding:12px 24px;
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  font-size:12px;color:var(--txt2);
  flex-wrap:wrap;
}
.leg-item{display:flex;align-items:center;gap:6px;font-size:12px}
.leg-dot{
  width:22px;height:22px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;font-size:14px;
}
.leg-dot.yes{background:rgba(48,209,88,.12)}
.leg-dot.partial{background:rgba(255,159,10,.12)}
.leg-dot.no{background:rgba(255,59,48,.08)}
.leg-dot.text{background:var(--bg3);font-size:10px;font-weight:700;color:var(--txt2)}

/* ── INFO ICON & TOOLTIP ── */
.feat-wrap{display:flex;align-items:center;gap:6px;position:relative}
.iico{
  flex-shrink:0;width:15px;height:15px;
  border-radius:50%;border:1.5px solid var(--txt2);
  display:inline-flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:700;font-style:normal;
  color:var(--txt2);cursor:pointer;
  transition:border-color .2s,color .2s;
  line-height:1;user-select:none;
}
.iico:hover{border-color:var(--accent);color:var(--accent)}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div class="logo">Platform <span>Comparator</span></div>
  <div class="hdr-right">
    <span class="counter-badge" id="counter-badge">Zobrazeno: — platforem</span>
    <button class="cmp-btn" id="cmp-btn" title="Porovnat vybrané platformy vedle sebe">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="2" y1="2" x2="2" y2="12"/><line x1="6" y1="2" x2="6" y2="12"/><line x1="10" y1="2" x2="10" y2="12"/></svg>
      Porovnat
    </button>
    <button class="reset-btn hidden" id="reset-btn">✕ Resetovat filtry</button>
  </div>
</header>

<!-- FILTER BAR -->
<div class="fbar" id="fbar">

  <div class="filter-group">
    <span class="filter-label">Kategorie</span>
    <button class="fpill on" data-ftype="cat" data-fval="all">Všechny</button>
    <button class="fpill" data-ftype="cat" data-fval="cms">CMS / DXP</button>
    <button class="fpill" data-ftype="cat" data-fval="ec">E-commerce</button>
  </div>

  <div class="fsep"></div>

  <div class="filter-group">
    <span class="filter-label">Tier</span>
    <button class="fpill on" data-ftype="tier" data-fval="all">Všechny</button>
    <button class="fpill" data-ftype="tier" data-fval="open-source">Open Source</button>
    <button class="fpill" data-ftype="tier" data-fval="saas-cloud">SaaS / Cloud</button>

// Fill in new feature fields for existing platforms that don't have them
function setupDefaults() {
  ALL_PLATFORMS.forEach(p => {
    const f = p.f;
    // perf: cloud-hosted or headless-first platforms generally score better
    if(f.perf === undefined) {
      f.perf = (p.filterTier==='enterprise' || p.filterTier==='headless') ? 1 :
               (p.filterTier==='saas-cloud' || p.filterTier==='mid-market') ? 1 : 0.5;
    }
    // multichannel: mirrors headless capability
    if(f.multichannel === undefined) {
      f.multichannel = f.headless;
    }
    // integration_eco: enterprise + mid-market have richer ecosystems
    if(f.integration_eco === undefined) {
      f.integration_eco = (p.filterTier==='enterprise') ? 1 :
                          (p.filterTier==='mid-market') ? 0.5 : 0.5;
    }
  });
}

function visiblePlatforms() {
  // Compare mode: show only selected platforms (in chosen order)
  if(S.compareMode && S.compareIds.length) {
    return S.compareIds.map(id => ALL_PLATFORMS.find(p=>p.id===id)).filter(Boolean);
  }
  return ALL_PLATFORMS.filter(p => {
    if(S.cat !== 'all' && p.cat !== S.cat) return false;
    if(S.tier !== 'all' && p.filterTier !== S.tier) return false;
    if(S.tech !== 'all' && !p.tech.includes(S.tech)) return false;
    if(S.search) {
      const q = S.search.toLowerCase();
      if(!p.name.toLowerCase().includes(q)) return false;
    }
    return true;
  });
}

function isFiltering() {
  return S.compareMode || S.cat!=='all' || S.tier!=='all' || S.tech!=='all' || S.search!=='';
}

// ═══════════════════════════════════════════════════════════════════
//  CELL RENDERER
// ═══════════════════════════════════════════════════════════════════
function cv(val) {
  if(val===1)   return `<span class="cv1" title="Nativní podpora">✓</span>`;
  if(val===0.5) return `<span class="cv5" title="Částečná / plugin">~</span>`;
  if(val===0)   return `<span class="cv0" title="Nepodporováno">✗</span>`;
  return `<span class="cvt">${val}</span>`;
}

// ═══════════════════════════════════════════════════════════════════
//  RENDER TABLE
// ═══════════════════════════════════════════════════════════════════
function renderTable() {
  const vis = visiblePlatforms();
  const tbl = document.getElementById('ctbl');

  // ── THEAD ──
  let thead = `<thead><tr>
    <th class="th-feat">Parametr / Platforma →</th>`;
  vis.forEach(p => {
    const url = PLATFORM_URLS[p.id] || '#';
    thead += `<th class="pth" data-pid="${p.id}">
      ${iconHtml(p)}
      <div class="p-name">${p.name}</div>
      <span class="cat-badge ${p.cat}">${p.cat==='cms'?'CMS/DXP':'E-commerce'}</span><br>
      <span class="tier-badge" style="background:${TIER_COLORS_MAP[p.filterTier]}">${TIER_LABELS_MAP[p.filterTier]}</span>
      <a class="www-btn" href="${url}" target="_blank" rel="noopener" title="${url}">
        Oficiální web ↗
      </a>
      <div class="specbar" title="${p.pricingTooltip}">
        <div class="specdot" style="left:${p.licensePos}%"></div>
        <div class="spec-tip">${p.pricingTooltip}</div>
      </div>
    </th>`;
  });
  thead += `</tr></thead>`;

  // ── TBODY ──
  let tbody = `<tbody>`;
  FEAT_GROUPS.forEach(grp => {
    const col = S.collapsed.has(grp.id);
    tbody += `<tr class="grow${col?' col':''}" data-grp="${grp.id}">
      <td colspan="${vis.length+1}"><span class="group-label"><i class="chev">▾</i> ${grp.label}</span></td>
    </tr>`;
    if(!col) {
      grp.feats.forEach(feat => {
        const isHL = S.hlFeat===feat.id;
        tbody += `<tr class="frow${isHL?' hlrow':''}" data-fid="${feat.id}">
          <td><div class="feat-wrap">${feat.label}${feat.tip ? `<i class="iico" data-tip="${feat.tip.replace(/"/g,'&quot;')}" tabindex="0" aria-label="Info: ${feat.label}">i</i>` : ''}</div></td>`;
        vis.forEach(p => {
          tbody += `<td data-pid="${p.id}">${cv(p.f[feat.id])}</td>`;
        });
        tbody += `</tr>`;
      });
    }
  });
  tbody += `</tbody>`;

  tbl.innerHTML = thead+tbody;
  attachLogos();

  // Apply highlight state
  if(S.hlFeat) applyHighlight(S.hlFeat, vis);

  // Events
  tbl.querySelectorAll('.grow').forEach(row => {
    row.addEventListener('click', () => {
      const g = row.dataset.grp;
      S.collapsed.has(g) ? S.collapsed.delete(g) : S.collapsed.add(g);
      renderTable();
    });
  });
  tbl.querySelectorAll('.frow').forEach(row => {
    row.addEventListener('click', () => {
      const fid = row.dataset.fid;
      if(S.hlFeat===fid){ S.hlFeat=null; clearHL(); }
      else { S.hlFeat=fid; applyHighlight(fid, vis); }
      renderTable();
    });
  });
}

function clearHL() {
  document.querySelectorAll('.pth').forEach(th => th.classList.remove('hl-yes','hl-no'));
}

function applyHighlight(fid, vis) {
  clearHL();
  vis.forEach(p => {
    const th = document.querySelector(`.pth[data-pid="${p.id}"]`);
    if(!th) return;
    const val = p.f[fid];
    if(val===1){ th.classList.add('hl-yes'); }
    else { th.classList.add('hl-no'); }
  });
}

function attachLogos() {
  document.querySelectorAll('.p-logo').forEach(img => {
    img.onerror = function() {
      const d = this.parentElement;
      d.innerHTML = d.dataset.abbr || '';
      d.style.background = d.dataset.color || '#999';
      d.style.color = '#fff';
      d.style.fontSize = '13px';
      d.style.fontWeight = '800';
      d.classList.remove('p-icon-logo');
    };
  });
}

// ═══════════════════════════════════════════════════════════════════
//  RENDER FIT DONUTS
// ═══════════════════════════════════════════════════════════════════
function renderFit() {
  const vis = visiblePlatforms();
  let html = `<div class="fit-sec">
    <h2 class="sec-title">Vhodnost pro zákazníky</h2>
    <p class="sec-sub">Procentuální skóre vhodnosti pro typ zákazníka a use-case. Animuje se při scrollu do viditelné oblasti.</p>
    <div class="fit-scroll">`;
  vis.forEach(p => {
    let donuts='';
    FIT_META.forEach(({k,l}) => {
      const pct=p.fit[k]||0;
      const uid=`d-${p.id}-${k}`;
      donuts+=`<div class="dw">
        <svg class="dsvg" viewBox="0 0 54 54">
          <circle class="dbg" cx="27" cy="27" r="24"/>
          <circle class="dring" id="${uid}" cx="27" cy="27" r="24"/>
          <text class="dpct" x="27" y="27">${pct}%</text>
        </svg>
        <div class="dlbl">${l}</div>
      </div>`;
    });
    html+=`<div class="fit-card" data-fcard="${p.id}">
      <div class="fc-head">
        <div class="fc-icon" style="background:${p.color}">${p.abbr}</div>
        <div>
          <div class="fc-name">${p.name}</div>
          <div class="fc-tier" style="color:${TIER_COLORS_MAP[p.filterTier]}">${TIER_LABELS_MAP[p.filterTier]}</div>
        </div>
      </div>
      <div class="donuts">${donuts}</div>
    </div>`;
  });
  html+=`</div></div>`;
  document.getElementById('fit-area').innerHTML = html;

  // IntersectionObserver for donut animation
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if(e.isIntersecting){
        const pid = e.target.dataset.fcard;
        const p = ALL_PLATFORMS.find(x=>x.id===pid);
        if(!p) return;
        FIT_META.forEach(({k})=>{
          const pct=p.fit[k]||0;
          const el=document.getElementById(`d-${pid}-${k}`);
          if(el) requestAnimationFrame(()=>{ el.style.strokeDashoffset=CIRC*(1-pct/100); });
        });
        io.unobserve(e.target);
      }
    });
  },{threshold:0.1});
  document.querySelectorAll('[data-fcard]').forEach(c=>io.observe(c));
}

  if(S.compareMode) {
    document.getElementById('counter-badge').textContent =
      `Srovnání: ${vis.length} platforem`;

    document.getElementById('counter-badge').textContent =
      `Zobrazeno: ${vis.length} / ${total} platforem`;

  const rb = document.getElementById('reset-btn');
  // Show reset only when filter active (not in compare mode — banner handles that)
  rb.classList.toggle('hidden', !isFiltering() || S.compareMode);
}

function initFilters() {
  document.querySelectorAll('.fpill[data-ftype]').forEach(btn => {
    btn.addEventListener('click', () => {
      const ft = btn.dataset.ftype;
      const fv = btn.dataset.fval;
      // deactivate siblings
      document.querySelectorAll(`.fpill[data-ftype="${ft}"]`).forEach(b=>b.classList.remove('on'));
      btn.classList.add('on');
      S[ft]=fv;
      S.hlFeat=null;
      render();
    });
  });

  document.getElementById('fsearch').addEventListener('input', e => {
    S.search = e.target.value.trim();
    S.hlFeat=null;
    render();
  });

  document.getElementById('reset-btn').addEventListener('click', () => {
    S.cat='all'; S.tier='all'; S.tech='all'; S.search=''; S.hlFeat=null;
    // reset pill visuals
    document.querySelectorAll('.fpill').forEach(b=>{
      b.classList.toggle('on', b.dataset.fval==='all');
    });
    document.getElementById('fsearch').value='';
    render();
  });
}

// ── Compare panel helpers ────────────────────────────────────────
function openCmpPanel() {
  S.cmpPending = [...S.compareIds];
  S.cmpQuery = '';
  document.getElementById('cmp-search').value = '';
  document.getElementById('cmp-panel').classList.add('open');
  document.getElementById('cmp-btn').classList.add('active');
  renderCmpResults();
  renderCmpTags();
  document.getElementById('cmp-search').focus();
}

function closeCmpPanel() {
  document.getElementById('cmp-panel').classList.remove('open');
  document.getElementById('cmp-btn').classList.remove('active');
}

function renderCmpResults() {
  const q = S.cmpQuery.toLowerCase();
  const list = q
    ? ALL_PLATFORMS.filter(p => p.name.toLowerCase().includes(q))
    : ALL_PLATFORMS;

  const container = document.getElementById('cmp-results');
  const maxed = S.cmpPending.length >= 5;
  container.innerHTML = list.map(p => {
    const sel = S.cmpPending.includes(p.id);
    const cls = sel ? 'sel' : (maxed && !sel ? 'maxed' : '');
    return `<button class="cmp-chip ${cls}" data-cpid="${p.id}">
      <span class="cmp-cdot" style="background:${p.color}"></span>
      ${p.name}
      <span style="font-size:9px;opacity:.6;font-weight:400">${p.cat==='cms'?'CMS':'EC'}</span>
    </button>`;
  }).join('');

  container.querySelectorAll('.cmp-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const id = chip.dataset.cpid;
      if(S.cmpPending.includes(id)) {
        S.cmpPending = S.cmpPending.filter(x=>x!==id);
      } else if(S.cmpPending.length < 5) {
        S.cmpPending.push(id);
      }
      renderCmpResults();
      renderCmpTags();
    });
  });
}

function renderCmpTags() {
  const container = document.getElementById('cmp-tags');
  container.innerHTML = S.cmpPending.map(id => {
    const p = ALL_PLATFORMS.find(x=>x.id===id);
    if(!p) return '';
    return `<span class="cmp-tag">
      <span style="width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.7);display:inline-block"></span>
      ${p.name}
      <span class="cmp-tag-x" data-tagid="${p.id}">×</span>
    </span>`;
  }).join('');

  container.querySelectorAll('.cmp-tag-x').forEach(x => {
    x.addEventListener('click', () => {
      S.cmpPending = S.cmpPending.filter(id=>id!==x.dataset.tagid);
      renderCmpResults();
      renderCmpTags();
    });
  });

  const n = S.cmpPending.length;
  const go = document.getElementById('cmp-go');
  const hint = document.getElementById('cmp-hint');
  go.disabled = n < 2;
  hint.textContent = n===0 ? 'Vyberte 2–5 platforem' :
                     n===1 ? 'Vyberte alespoň jednu další' :
                     `${n} platforem vybráno`;
}

function activateCompare(ids) {
  S.compareIds   = [...ids];
  S.compareMode  = true;
  closeCmpPanel();
  updateHash();
  render();
  updateCompareBanner();
}

function endCompare() {
  S.compareIds  = [];
  S.compareMode = false;
  updateHash();
  render();
  updateCompareBanner();
}

function updateCompareBanner() {
  const banner = document.getElementById('cmp-banner');
  if(S.compareMode && S.compareIds.length) {
    const names = S.compareIds
      .map(id => ALL_PLATFORMS.find(p=>p.id===id)?.name || id)
      .join(' · ');
    document.getElementById('cmp-banner-names').textContent = names;
    banner.classList.add('active');
  } else {
    banner.classList.remove('active');
  }
}

function updateHash() {
  if(S.compareMode && S.compareIds.length) {
    history.replaceState(null,'','#compare='+S.compareIds.join(','));
  } else {
    history.replaceState(null,'',location.pathname+location.search);
  }
}

function initCompare() {
  document.getElementById('cmp-btn').addEventListener('click', () => {
    document.getElementById('cmp-panel').classList.contains('open')
      ? closeCmpPanel()
      : openCmpPanel();
  });

  document.getElementById('cmp-cancel').addEventListener('click', closeCmpPanel);

  document.getElementById('cmp-go').addEventListener('click', () => {
    if(S.cmpPending.length >= 2) activateCompare(S.cmpPending);
  });

  document.getElementById('cmp-end').addEventListener('click', endCompare);

  document.getElementById('cmp-search').addEventListener('input', e => {
    S.cmpQuery = e.target.value.trim();
    renderCmpResults();
  });

  document.querySelectorAll('.cmp-preset').forEach(btn => {
    btn.addEventListener('click', () => {
      const ids = btn.dataset.preset.split(',');
      activateCompare(ids);
    });
  });

  // Read hash on load
  const hash = location.hash;
  if(hash.startsWith('#compare=')) {
    const ids = hash.replace('#compare=','').split(',').filter(id =>
      ALL_PLATFORMS.some(p=>p.id===id)
    );
    if(ids.length >= 2) {
      S.compareIds  = ids;
      S.compareMode = true;
      updateCompareBanner();
    }
  }
}

// ═══════════════════════════════════════════════════════════════════
//  TOOLTIP — single shared element, event-delegated (attached once)
// ═══════════════════════════════════════════════════════════════════
function initSharedTooltip() {
  const tip = document.getElementById('shared-tip');
  let hideTimer = null;
  let activeIcon = null;

  function positionAndShow(icon) {
    clearTimeout(hideTimer);
    const text = icon.getAttribute('data-tip');
    if(!text) return;
    activeIcon = icon;
    tip.textContent = text;
    tip.classList.remove('tip-above');
    tip.style.right = 'auto';

    // Initial placement below icon
    const r = icon.getBoundingClientRect();
    tip.style.left = Math.max(8, r.left - 8) + 'px';
    tip.style.top  = (r.bottom + 10) + 'px';
    tip.classList.add('tip-show');

    // After paint: correct overflow
    requestAnimationFrame(() => {
      const tr = tip.getBoundingClientRect();
      if(tr.bottom > window.innerHeight - 12) {
        tip.style.top = (r.top - tr.height - 10) + 'px';
        tip.classList.add('tip-above');
      }
      if(tr.right > window.innerWidth - 12) {
        tip.style.left = 'auto';
        tip.style.right = '12px';
      }
    });
  }

  function hide() {
    hideTimer = setTimeout(() => {
      tip.classList.remove('tip-show','tip-above');
      activeIcon = null;
    }, 100);
  }

  // Hover — works even after table re-render (delegation on document)
  document.addEventListener('mouseover', e => {
    const icon = e.target.closest('.iico');
    if(icon) { clearTimeout(hideTimer); positionAndShow(icon); }
  });
  document.addEventListener('mouseout', e => {
    if(e.target.closest('.iico')) hide();
  });

  // Click toggle (mobile + desktop)
  document.addEventListener('click', e => {
    const icon = e.target.closest('.iico');
    if(icon) {
      e.stopPropagation();
      if(activeIcon === icon && tip.classList.contains('tip-show')) {
        clearTimeout(hideTimer);
        tip.classList.remove('tip-show','tip-above');
        activeIcon = null;
      } else {
        positionAndShow(icon);
      }
      return;
    }
    // Click outside → hide
    if(!e.target.closest('#shared-tip')) hide();
  }, true);

  document.addEventListener('keydown', e => {
    if(e.key === 'Escape') { clearTimeout(hideTimer); tip.classList.remove('tip-show','tip-above'); activeIcon = null; }
  });
}

</script>

<!-- Shared tooltip element -->
<div id="shared-tip" role="tooltip" aria-live="polite"></div>

</body>
</html>
